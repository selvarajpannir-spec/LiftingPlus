name: Build Signed APK & AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to manually click a button to trigger a build anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Decodes your text-based keystore secret back into the actual liftingplus.jks file
    - name: Decode Keystore File
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$ENCODED_STRING" | base64 --decode > app/liftingplus.jks

    - name: Grant Execute Permission to Gradle
      run: chmod +x gradlew

    # CRITICAL STEP: Compiles and signs BOTH the APK and AAB simultaneously
    - name: Build Signed APK and AAB
      env:
        KEYSTORE_PASSWORD: ${{ Aa484041@# }}
        KEY_ALIAS: ${{ release_key }}
        KEY_PASSWORD: ${{ Aa484041@# }}
      run: ./gradlew assembleRelease bundleRelease

    # Uploads the final signed APK (For personal phone checking)
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: LiftingPlus-Signed-APK
        path: app/build/outputs/apk/release/app-release.apk

    # Uploads the final signed AAB (For Google Play Store Console)
    - name: Upload Signed Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: LiftingPlus-Signed-AAB
        path: app/build/outputs/bundle/release/app-release.aab
        
