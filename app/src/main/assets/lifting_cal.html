<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rigging & Lifting Geometry Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:       #1553A8;
            --primary-light: #EAF0FB;
            --primary-glow:  rgba(21,83,168,0.12);
            --secondary:     #0D7F6E;
            --accent:        #E07B00;
            --danger:        #C0392B;
            --success:       #1A7A45;
            --success-light: #E8F5EE;
            --surface:       #FFFFFF;
            --surface-2:     #F5F6FA;
            --surface-3:     #ECEEF4;
            --border:        #D0D4E0;
            --border-strong: #A8AEBF;
            --text-primary:  #111827;
            --text-secondary:#4B5263;
            --text-muted:    #8B92A5;

            --font-display: 'Barlow Condensed', sans-serif;
            --font-body:    'Barlow', sans-serif;
            --font-mono:    'DM Mono', monospace;

            --radius-sm: 0.5rem;
            --radius-md: 0.8rem;
            --radius-lg: 1.2rem;

            --shadow-sm:  0 0.1rem 0.3rem rgba(0,0,0,0.06), 0 0.1rem 0.2rem rgba(0,0,0,0.04);
            --shadow-md:  0 0.4rem 1.2rem rgba(0,0,0,0.08), 0 0.1rem 0.3rem rgba(0,0,0,0.05);
            --shadow-lg:  0 0.8rem 2.4rem rgba(0,0,0,0.10), 0 0.2rem 0.6rem rgba(0,0,0,0.06);
        }

        html { font-size: 62.5%; }
        * { box-sizing: border-box; margin: 0; padding: 0;
            font-family: var(--font-body);
            -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--surface-2);
            color: var(--text-primary);
            padding: 1rem;
            font-size: 1.4rem;
            line-height: 1.5;
            scroll-behavior: smooth;
            min-height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        #app-root {
            height: 100dvh;
            overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ── Navigation ── */
        .nav-tabs {
            display: flex;
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            margin-bottom: 1.6rem;
            padding-top: env(safe-area-inset-top, 0px);
            border: 1px solid var(--border);
            gap: 0.4rem;
            padding: env(safe-area-inset-top, 0px) 0.5rem 0.5rem 0.5rem;
        }
        .tab-btn {
            flex: 1;
            padding: 1rem 0.6rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.35rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            min-height: 5rem;
            border-radius: var(--radius-md);
            transition: color 0.18s ease, background 0.18s ease;
        }
        .tab-btn.active {
            color: var(--primary);
            background: var(--primary-light);
            font-weight: 700;
        }
        .tab-btn:active { opacity: 0.75; }

        /* ── Section Cards ── */
        .section-container {
            display: none;
            background: var(--surface);
            padding: 1.8rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }
        .section-container.active { display: block; }

        /* ── Section Headers ── */
        h2 {
            font-family: var(--font-display);
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--primary);
            margin-bottom: 1.6rem;
            padding-bottom: 0.8rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            border-bottom: 2px solid var(--primary-light);
        }

        .grid { display: grid; grid-template-columns: 1fr; gap: 1.8rem; }

        /* ── Input Controls ── */
        .input-box { display: flex; flex-direction: column; margin-bottom: 1.2rem; }

        label {
            font-weight: 600;
            font-size: 1.25rem;
            letter-spacing: 0.02em;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
        }

        input[type="number"], select {
            width: 100%;
            padding: 1.2rem 1.4rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1.5rem;
            font-family: var(--font-mono);
            font-weight: 500;
            background: var(--surface-2);
            color: var(--text-primary);
            -webkit-appearance: none;
            min-height: 5rem;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }
        input[type="number"]:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            background: var(--surface);
            box-shadow: 0 0 0 0.3rem var(--primary-glow);
        }
        input[type="number"]::placeholder { color: var(--text-muted); font-size: 1.3rem; font-family: var(--font-body); }

        /* ── Buttons ── */
        .btn-container { display: flex; gap: 1rem; margin-top: 1.8rem; }

        .btn-apply {
            flex: 2;
            padding: 1.4rem;
            background: linear-gradient(160deg, #1A7A45 0%, #158038 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-transform: uppercase;
            min-height: 5rem;
            box-shadow: 0 0.3rem 0.8rem rgba(26,122,69,0.30);
            transition: filter 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
        }
        .btn-apply:active { filter: brightness(0.93); transform: translateY(0.1rem); box-shadow: 0 0.1rem 0.4rem rgba(26,122,69,0.20); }

        .btn-clear {
            flex: 1;
            padding: 1.4rem;
            background: linear-gradient(160deg, #C0392B 0%, #A93226 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-transform: uppercase;
            min-height: 5rem;
            box-shadow: 0 0.3rem 0.8rem rgba(192,57,43,0.25);
            transition: filter 0.15s ease, transform 0.12s ease;
        }
        .btn-clear:active { filter: brightness(0.93); transform: translateY(0.1rem); }

        .btn-pdf {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(160deg, var(--primary) 0%, #0F3F87 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            margin-top: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            min-height: 5rem;
            box-shadow: 0 0.3rem 0.8rem rgba(21,83,168,0.28);
            transition: filter 0.15s ease, transform 0.12s ease;
        }
        .btn-pdf:active { filter: brightness(0.93); transform: translateY(0.1rem); }

        /* ── SVG Canvas — blueprint style ── */
        .screen {
            background:
                linear-gradient(rgba(21,83,168,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(21,83,168,0.04) 1px, transparent 1px),
                linear-gradient(rgba(21,83,168,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(21,83,168,0.015) 1px, transparent 1px),
                #F8FAFF;
            background-size: 3rem 3rem, 3rem 3rem, 0.6rem 0.6rem, 0.6rem 0.6rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 24rem;
            margin-top: 1rem;
            position: relative;
            box-shadow: inset 0 0.2rem 0.6rem rgba(21,83,168,0.04);
        }
        svg { width: 100%; max-width: 29rem; height: 21rem; }

        /* ── Breakdown Cards ── */
        .breakdown-card {
            background: var(--surface);
            padding: 1.4rem 1.6rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.2rem;
            border: 1px solid var(--border);
            border-left: 0.4rem solid var(--border-strong);
            box-shadow: var(--shadow-sm);
        }
        .breakdown-card.primary { border-left-color: var(--primary); background: #FAFCFF; }
        .breakdown-card.secondary { border-left-color: var(--secondary); background: #F8FFFD; }
        .breakdown-card.success { border-left-color: var(--success); background: var(--success-light); }

        .breakdown-card label {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0;
        }

        .formula-text {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            white-space: pre-wrap;
            margin-top: 0.7rem;
            color: var(--text-primary);
            line-height: 1.6;
            border-top: 1px dashed var(--border);
            padding-top: 0.7rem;
            background: var(--surface-2);
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            margin-top: 0.8rem;
        }

        /* ── Badges ── */
        .badge {
            background: var(--surface-3);
            color: var(--text-muted);
            padding: 0.25rem 0.7rem;
            border-radius: 10rem;
            font-size: 1.05rem;
            font-family: var(--font-display);
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .badge.user {
            background: var(--primary-light);
            color: var(--primary);
            border-color: rgba(21,83,168,0.2);
        }
        .badge.computed {
            background: var(--success-light);
            color: var(--success);
            border-color: rgba(26,122,69,0.2);
        }

        /* ── Print ── */
        @media print {
            body { background: white; color: black; padding: 0; }
            .nav-tabs, .btn-container, .btn-pdf, input, select { display: none !important; }
            .section-container { display: block !important; box-shadow: none; padding: 0; margin-bottom: 4rem; page-break-inside: avoid; border: none; }
            .screen { background: #FFF !important; border: 1px solid #C7C7CC; min-height: auto; }
            svg text { fill: black !important; }
            svg line { stroke: black !important; }
            .breakdown-card { background: #FFF !important; border: 1px solid #C7C7CC; page-break-inside: avoid; box-shadow: none; }
        }

        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div id="app-root">

    <div class="nav-tabs">
        <button id="tab1" class="tab-btn active" onclick="showPage(1)">1. Crane Boom 🏗️</button>
        <button id="tab2" class="tab-btn" onclick="showPage(2)">2. Web Sling 📦</button>
    </div>

    <div id="page1" class="section-container active">
        <div class="grid">
            <div>
                <h2>Crane Inputs 🏗️ (Provide Any 2)</h2>
                <div class="input-box">
                    <label>Side BC: Vertical Height (Opposite) <span id="badgeA" class="badge">Idle</span></label>
                    <input type="number" id="sideA" step="0.01" placeholder="Height from boom heel pin (meters)">
                </div>
                <div class="input-box">
                    <label>Side AB: Working Radius (Adjacent) <span id="badgeB" class="badge">Idle</span></label>
                    <input type="number" id="sideB" step="0.01" placeholder="Horizontal radius (meters)">
                </div>
                <div class="input-box">
                    <label>Side AC: Boom Length (Hypotenuse) <span id="badgeC" class="badge">Idle</span></label>
                    <input type="number" id="sideC" step="0.01" placeholder="Total pinning length (meters)">
                </div>
                <div class="input-box">
                    <label>Angle θ (Boom Angle at Vertex A) <span id="badgeAngle" class="badge">Idle</span></label>
                    <input type="number" id="angle" step="0.01" placeholder="Inclination to horizontal plane (°)">
                </div>
                
                <div class="btn-container">
                    <button class="btn-apply" onclick="calculateCrane()">Apply & Draw 🏗️</button>
                    <button class="btn-clear" onclick="clearCrane()">Clear</button>
                </div>
                <button class="btn-pdf" onclick="window.print()">Export Crane Data to PDF 🖨️</button>
            </div>

            <div>
                <h2>Real-Time Scaled Crane Triangle (ABC) 🏗️</h2>
                <div class="screen">
                    <svg viewBox="0 0 300 220">
                        <line x1="20" y1="190" x2="280" y2="190" stroke="#A8AEBF" stroke-width="2"/>
                        <line id="crane_vB" x1="40" y1="190" x2="240" y2="190" stroke="#E07B00" stroke-width="3" stroke-dasharray="2"/>
                        <line id="crane_vA" x1="240" y1="190" x2="240" y2="40" stroke="#1A7A45" stroke-width="3" stroke-dasharray="2"/>
                        <line id="crane_vC" x1="40" y1="190" x2="240" y2="40" stroke="#1553A8" stroke-width="4"/>
                        
                        <text id="crane_vtxA" x="22" y="195" fill="#111827" font-size="14" font-weight="bold">A</text>
                        <text id="crane_vtxB" x="248" y="204" fill="#111827" font-size="14" font-weight="bold">B</text>
                        <text id="crane_vtxC" x="242" y="30" fill="#111827" font-size="14" font-weight="bold">C</text>
                        
                        <text id="crane_lblC" fill="#1553A8" font-size="11" font-weight="bold" text-anchor="end"></text>
                        <text id="crane_lblA" fill="#1A7A45" font-size="11" font-weight="bold" text-anchor="start"></text>
                        <text id="crane_lblB" fill="#E07B00" font-size="11" font-weight="bold" text-anchor="middle"></text>
                        <text id="crane_lblAngle" fill="#1553A8" font-size="11" font-weight="bold"></text>
                        <text id="crane_lblAlpha" fill="#8B92A5" font-size="11" font-weight="bold"></text>
                    </svg>
                </div>

                <div id="craneFormulasLayout" style="display:none; margin-top:1.5rem;">
                    <div class="breakdown-card primary">
                        <label>Boom Angle (θ at Corner A) Derivation:</label>
                        <div id="out_craneAngleVal" style="font-size:1.6rem; font-weight:bold; color:#1553A8; margin-top:0.2rem;">--</div>
                        <div id="trace_craneAngle" class="formula-text"></div>
                    </div>
                    <div class="breakdown-card success">
                        <label>Vertical Height Distance (BC) Derivation:</label>
                        <div id="out_craneAVal" style="font-size:1.6rem; font-weight:bold; color:#1A7A45; margin-top:0.2rem;">--</div>
                        <div id="trace_craneA" class="formula-text"></div>
                    </div>
                    <div class="breakdown-card">
                        <label>Working Radius Distance (AB) Derivation:</label>
                        <div id="out_craneBVal" style="font-size:1.6rem; font-weight:bold; color:#111827; margin-top:0.2rem;">--</div>
                        <div id="trace_craneB" class="formula-text"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="page2" class="section-container">
        <div class="grid">
            <div>
                <h2>Sling Inputs 📦 (Provide Any 2)</h2>
                <div class="input-box">
                    <label>Sling Headroom Vertical Height (CD) <span id="badgeSlingA" class="badge">Idle</span></label>
                    <input type="number" id="slingA" step="0.01" placeholder="Hook down vertically to load plane (meters)">
                </div>
                <div class="input-box">
                    <label>Total Horizontal Pad-Eye Spread (AB) <span id="badgeSlingB" class="badge">Idle</span></label>
                    <input type="number" id="slingB" step="0.01" placeholder="Full distance between hookup points (meters)">
                </div>
                <div class="input-box">
                    <label>Sling Leg Working Length (AC & BC) <span id="badgeSlingC" class="badge">Idle</span></label>
                    <input type="number" id="slingC" step="0.01" placeholder="Length of individual web sling leg (meters)">
                </div>
                <div class="input-box">
                    <label>Sling Load Angle β (At Vertices A & B) <span id="badgeSlingAngle" class="badge">Idle</span></label>
                    <input type="number" id="slingAngleField" step="0.01" placeholder="Sling angle relative to horizontal load line (°)">
                </div>
                
                <div class="btn-container">
                    <button class="btn-apply" style="background:linear-gradient(160deg,#0D7F6E 0%,#0A6558 100%); box-shadow:0 0.3rem 0.8rem rgba(13,127,110,0.28);" onclick="calculateSling()">Apply & Draw 📦</button>
                    <button class="btn-clear" onclick="clearSling()">Clear</button>
                </div>
                <button class="btn-pdf" onclick="window.print()">Export Sling Data to PDF 🖨️</button>
            </div>

            <div>
                <h2>Real-Time Balanced Sling Triangle (ABC) 📦</h2>
                <div class="screen">
                    <svg viewBox="0 0 300 220">
                        <line x1="20" y1="190" x2="280" y2="190" stroke="#A8AEBF" stroke-width="2"/>
                        <line id="sling_vA" x1="150" y1="190" x2="150" y2="190" stroke="#1A7A45" stroke-width="2" stroke-dasharray="2"/>
                        <line id="sling_vB_left" x1="150" y1="190" x2="150" y2="190" stroke="#E07B00" stroke-width="2" stroke-dasharray="2"/>
                        <line id="sling_vB_right" x1="150" y1="190" x2="150" y2="190" stroke="#E07B00" stroke-width="2" stroke-dasharray="2"/>
                        <line id="sling_vC_left" x1="150" y1="190" x2="150" y2="190" stroke="#1553A8" stroke-width="3"/>
                        <line id="sling_vC_right" x1="150" y1="190" x2="150" y2="190" stroke="#1553A8" stroke-width="3"/>
                        
                        <text id="sling_vtxA" x="150" y="204" fill="#111827" font-size="14" font-weight="bold">A</text>
                        <text id="sling_vtxB" x="150" y="204" fill="#111827" font-size="14" font-weight="bold">B</text>
                        <text id="sling_vtxC" x="145" y="190" fill="#111827" font-size="14" font-weight="bold">C</text>
                        <text id="sling_vtxD" x="145" y="204" fill="#8B92A5" font-size="11" font-weight="bold">D</text>
                        
                        <text id="sling_lblC_left" fill="#1553A8" font-size="10" font-weight="bold" text-anchor="end"></text>
                        <text id="sling_lblC_right" fill="#1553A8" font-size="10" font-weight="bold" text-anchor="start"></text>
                        <text id="sling_lblA" fill="#1A7A45" font-size="10" font-weight="bold" text-anchor="end"></text>
                        <text id="sling_lblB" fill="#E07B00" font-size="10" font-weight="bold" text-anchor="middle"></text>
                        <text id="sling_lblAngleA" fill="#111827" font-size="10" font-weight="bold"></text>
                        <text id="sling_lblAngleB" fill="#111827" font-size="10" font-weight="bold" text-anchor="end"></text>
                        <text id="sling_lblAngleC" fill="#1553A8" font-size="10" font-weight="bold" text-anchor="middle"></text>
                    </svg>
                </div>

                <div id="slingFormulasLayout" style="display:none; margin-top:1.5rem;">
                    <div class="breakdown-card primary">
                        <label>Sling Apex Angle (Angle at Vertex C) Derivation:</label>
                        <div id="out_slingApexAngleVal" style="font-size:1.6rem; font-weight:bold; color:#1553A8; margin-top:0.2rem;">--</div>
                        <div id="trace_slingApexAngle" class="formula-text"></div>
                    </div>
                    <div class="breakdown-card secondary">
                        <label>Sling Base Loading Angle (β at Corners A & B) Derivation:</label>
                        <div id="out_slingAngleVal" style="font-size:1.6rem; font-weight:bold; color:#0D7F6E; margin-top:0.2rem;">--</div>
                        <div id="trace_slingAngle" class="formula-text"></div>
                    </div>
                    <div class="breakdown-card success">
                        <label>Vertical Headroom Clearance Distance (CD) Derivation:</label>
                        <div id="out_slingAVal" style="font-size:1.6rem; font-weight:bold; color:#1A7A45; margin-top:0.2rem;">--</div>
                        <div id="trace_slingA" class="formula-text"></div>
                    </div>
                    <div class="breakdown-card">
                        <label>Full Horizontal Span Width Distance (AB) Derivation:</label>
                        <div id="out_slingBVal" style="font-size:1.6rem; font-weight:bold; color:#111827; margin-top:0.2rem;">--</div>
                        <div id="trace_slingB" class="formula-text"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>
        // Core Tab System Switch Engine
        function showPage(pageId) {
            document.querySelectorAll('.section-container').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page' + pageId).classList.add('active');
            document.getElementById('tab' + pageId).classList.add('active');
        }

        function clearCrane() {
            ['sideA', 'sideB', 'sideC', 'angle'].forEach(id => document.getElementById(id).value = "");
            ['A', 'B', 'C', 'Angle'].forEach(v => resetBadge('badge' + v));
            document.getElementById('craneFormulasLayout').style.display = "none";
            renderTriangle('crane', 40, 190, 240, 190, 240, 40, null, null, null, null, null);
        }

        function clearSling() {
            ['slingA', 'slingB', 'slingC', 'slingAngleField'].forEach(id => document.getElementById(id).value = "");
            ['SlingA', 'SlingB', 'SlingC', 'SlingAngle'].forEach(v => resetBadge('badge' + v));
            document.getElementById('slingFormulasLayout').style.display = "none";
            renderSlingTriangle(null, null, null, null, null);
        }

        function resetBadge(id) {
            const b = document.getElementById(id);
            if(b) { b.innerText = "Idle"; b.className = "badge"; b.style.background = "#E5E5EA"; b.style.color = "#3A3A3C"; }
        }

        function setBadgeStates(prefix, activeKeys) {
            activeKeys.forEach(k => {
                const b = document.getElementById(prefix + k);
                if(b) { b.innerText = "User Key"; b.className = "badge user"; b.style.background = "#0076FF"; b.style.color = "white"; }
            });
            let computed = [];
            if(prefix.includes('Sling')) { computed = ['SlingA', 'SlingB', 'SlingC', 'SlingAngle'].filter(x => !activeKeys.includes(x)); }
            else { computed = ['A', 'B', 'C', 'Angle'].filter(x => !activeKeys.includes(x)); }
            computed.forEach(k => {
                const b = document.getElementById(prefix + k);
                if(b) { b.innerText = "Computed"; b.className = "badge computed"; b.style.background = "#E4F9E8"; b.style.color = "#34C759"; }
            });
        }

        function calculateCrane() {
            let A = parseFloat(document.getElementById('sideA').value); // Opposite (BC)
            let B = parseFloat(document.getElementById('sideB').value); // Adjacent (AB)
            let C = parseFloat(document.getElementById('sideC').value); // Hypotenuse (AC)
            let θ = parseFloat(document.getElementById('angle').value);

            let keys = [];
            if (!isNaN(A) && A > 0) keys.push('A');
            if (!isNaN(B) && B > 0) keys.push('B');
            if (!isNaN(C) && C > 0) keys.push('C');
            if (!isNaN(θ) && θ > 0) keys.push('Angle');

            if (keys.length < 2) return alert("Please fill in at least 2 fields to resolve Crane Boom geometry.");
            setBadgeStates('badge', keys);

            let traceAngle = "", traceA = "", traceB = "";

            if (keys.includes('A') && keys.includes('B')) {
                θ = Math.atan(A / B) * (180 / Math.PI); C = Math.sqrt(A*A + B*B);
                traceAngle = `Using Trigonometric Tangent:\nθ = arctan(Opposite BC ÷ Adjacent AB)\nθ = arctan(${A} ÷ ${B})\nθ = ${θ.toFixed(2)}°`;
                traceA = traceB = `Provided directly via user configuration parameters.`;
            } else if (keys.includes('A') && keys.includes('C')) {
                if (A > C) return alert("Structural Error: Height (BC) cannot exceed total Boom Length (AC)!");
                θ = Math.asin(A / C) * (180 / Math.PI); B = Math.sqrt(C*C - A*A);
                traceAngle = `Using Trigonometric Sine:\nθ = arcsin(Opposite BC ÷ Hypotenuse AC)\nθ = arcsin(${A} ÷ ${C})\nθ = ${θ.toFixed(2)}°`;
                traceA = `Provided directly via user configuration parameters.`;
                traceB = `Using Pythagorean Theorem:\nAB = √(AC² - BC²)\nAB = √(${C}² - ${A}²)\nAB = ${B.toFixed(2)}m`;
            } else if (keys.includes('B') && keys.includes('C')) {
                if (B > C) return alert("Structural Error: Operating Radius (AB) cannot exceed total Boom Length (AC)!");
                θ = Math.acos(B / C) * (180 / Math.PI); A = Math.sqrt(C*C - B*B);
                traceAngle = `Using Trigonometric Cosine:\nθ = arccos(Adjacent AB ÷ Hypotenuse AC)\nθ = arccos(${B} ÷ ${C})\nθ = ${θ.toFixed(2)}°`;
                traceB = `Provided directly via user configuration parameters.`;
                traceA = `Using Pythagorean Theorem:\nBC = √(AC² - AB²)\nBC = √(${C}² - ${B}²)\nBC = ${A.toFixed(2)}m`;
            } else if (keys.includes('Angle')) {
                const rad = θ * (Math.PI / 180); traceAngle = `Provided directly via user configuration parameters.`;
                if (keys.includes('C')) {
                    A = C * Math.sin(rad); B = C * Math.cos(rad);
                    traceA = `Using Sine Base Functions:\nBC = AC × sin(θ) = ${C} × sin(${θ}°) = ${A.toFixed(2)}m`;
                    traceB = `Using Cosine Base Functions:\nAB = AC × cos(θ) = ${B} × cos(${θ}°) = ${B.toFixed(2)}m`;
                } else if (keys.includes('A')) {
                    C = A / Math.sin(rad); B = A / Math.tan(rad);
                    traceA = `Provided directly via user configuration parameters.`;
                    traceB = `Using Tangent Base Functions:\nAB = BC ÷ tan(θ) = ${A} ÷ tan(${θ}°) = ${B.toFixed(2)}m`;
                } else if (keys.includes('B')) {
                    C = B / Math.cos(rad); A = B * Math.tan(rad);
                    traceB = `Provided directly via user configuration parameters.`;
                    traceA = `Using Tangent Base Functions:\nBC = AB × tan(θ) = ${B} × tan(${θ}°) = ${A.toFixed(2)}m`;
                }
            }

            let alpha = 90 - θ;
            document.getElementById('sideA').value = A.toFixed(2);
            document.getElementById('sideB').value = B.toFixed(2);
            document.getElementById('sideC').value = C.toFixed(2);
            document.getElementById('angle').value = θ.toFixed(2);

            document.getElementById('out_craneAngleVal').innerText = θ.toFixed(2) + "°";
            document.getElementById('trace_craneAngle').innerText = traceAngle;
            document.getElementById('out_craneAVal').innerText = A.toFixed(2) + " m";
            document.getElementById('trace_craneA').innerText = traceA;
            document.getElementById('out_craneBVal').innerText = B.toFixed(2) + " m";
            document.getElementById('trace_craneB').innerText = traceB;

            document.getElementById('craneFormulasLayout').style.display = "block";
            const scale = 150 / Math.max(A, B);
            renderTriangle('crane', 40, 190, 40 + (B * scale), 190, 40 + (B * scale), 190 - (A * scale), A, B, C, θ, alpha);
        }

        function calculateSling() {
            let A = parseFloat(document.getElementById('slingA').value); // Vertical drop (CD)
            let B = parseFloat(document.getElementById('slingB').value); // Full width spread (AB)
            let C = parseFloat(document.getElementById('slingC').value); // Legs (AC/BC)
            let β = parseFloat(document.getElementById('slingAngleField').value);

            let keys = [];
            if (!isNaN(A) && A > 0) keys.push('SlingA');
            if (!isNaN(B) && B > 0) keys.push('SlingB');
            if (!isNaN(C) && C > 0) keys.push('SlingC');
            if (!isNaN(β) && β > 0) keys.push('SlingAngle');

            if (keys.length < 2) return alert("Please fill in at least 2 fields to process Symmetric Sling layouts.");
            setBadgeStates('badgeSling', keys);

            let traceAngle = "", traceA = "", traceB = "";
            let halfB = B / 2;

            if (keys.includes('SlingA') && keys.includes('SlingB')) {
                β = Math.atan(A / halfB) * (180 / Math.PI); C = Math.sqrt(A*A + halfB*halfB);
                traceAngle = `Using Tangent calculation tracking on internal Right-Triangle (ACD):\nβ = arctan(Height CD ÷ Half-Spread AD)\nβ = arctan(${A} ÷ ${halfB.toFixed(2)})\nβ = ${β.toFixed(2)}°`;
                traceA = traceB = `Symmetric vector profile provided directly by standard input.`;
            } else if (keys.includes('SlingA') && keys.includes('SlingC')) {
                if (A > C) return alert("Rigging Error: Headroom Height (CD) cannot exceed Sling Leg Length (AC)!");
                β = Math.asin(A / C) * (180 / Math.PI); halfB = Math.sqrt(C*C - A*A); B = halfB * 2;
                traceAngle = `Using Trigonometric Sine calculation:\nβ = arcsin(Height CD ÷ Leg Length AC)\nβ = arcsin(${A} ÷ ${C})\nβ = ${β.toFixed(2)}°`;
                traceB = `Using Pythagorean Matrix:\nAD = √(AC² - CD²) = √(${C}² - ${A}²) = ${halfB.toFixed(2)}m\nFull Spread AB = AD × 2 = ${B.toFixed(2)}m`;
                traceA = `Provided directly via user configuration parameters.`;
            } else if (keys.includes('SlingB') && keys.includes('SlingC')) {
                if (halfB > C) return alert("Rigging Error: Half-Spread (AD) cannot exceed Sling Leg Length (AC)!");
                β = Math.acos(halfB / C) * (180 / Math.PI); A = Math.sqrt(C*C - halfB*halfB);
                traceAngle = `Using Trigonometric Cosine calculation:\nβ = arccos(Half-Spread AD ÷ Leg Length AC)\nβ = arccos(${halfB.toFixed(2)} ÷ ${C})\nβ = ${β.toFixed(2)}°`;
                traceB = `Provided directly via user configuration parameters.`;
                traceA = `Using Pythagorean Matrix:\nCD = √(AC² - AD²) = √(${C}² - ${halfB.toFixed(2)}²) = ${A.toFixed(2)}m`;
            } else if (keys.includes('SlingAngle')) {
                const rad = β * (Math.PI / 180); traceAngle = `Provided directly via user configuration parameters.`;
                if (keys.includes('SlingC')) {
                    A = C * Math.sin(rad); halfB = C * Math.cos(rad); B = halfB * 2;
                    traceA = `Using Sine function rules:\nCD = AC × sin(β) = ${C} × sin(${β}°) = ${A.toFixed(2)}m`;
                    traceB = `Using Cosine function rules:\nAD = AC × cos(β) = ${C} × cos(${β}°)\nFull Spread AB = AD × 2 = ${B.toFixed(2)}m`;
                } else if (keys.includes('SlingA')) {
                    C = A / Math.sin(rad); halfB = A / Math.tan(rad); B = halfB * 2;
                    traceA = `Provided directly via user configuration parameters.`;
                    traceB = `Using Tangent function rules:\nAD = CD ÷ tan(β) = ${A} ÷ tan(${β}°)\nFull Spread AB = AD × 2 = ${B.toFixed(2)}m`;
                } else if (keys.includes('SlingB')) {
                    C = halfB / Math.cos(rad); A = halfB * Math.tan(rad);
                    traceA = `Using Tangent function rules:\nCD = AD × tan(β) = ${halfB.toFixed(2)} × tan(${β}°) = ${A.toFixed(2)}m`;
                    traceB = `Provided directly via user configuration parameters.`;
                }
            }

            let alpha = 90 - β;
            let apexAngle = 180 - (2 * β);

            document.getElementById('slingA').value = A.toFixed(2);
            document.getElementById('slingB').value = B.toFixed(2);
            document.getElementById('slingC').value = C.toFixed(2);
            document.getElementById('slingAngleField').value = β.toFixed(2);

            document.getElementById('out_slingApexAngleVal').innerText = apexAngle.toFixed(2) + "°";
            document.getElementById('trace_slingApexAngle').innerText = `Using Triangle Internal Angles Sum Rule:\nAngle C = 180° - (Angle A + Angle B)\nAngle C = 180° - (${β.toFixed(2)}° + ${β.toFixed(2)}°)\nAngle C = ${apexAngle.toFixed(2)}°`;

            document.getElementById('out_slingAngleVal').innerText = β.toFixed(2) + "°";
            document.getElementById('trace_slingAngle').innerText = traceAngle;
            document.getElementById('out_slingAVal').innerText = A.toFixed(2) + " m";
            document.getElementById('trace_slingA').innerText = traceA;
            document.getElementById('out_slingBVal').innerText = B.toFixed(2) + " m";
            document.getElementById('trace_slingB').innerText = traceB;

            document.getElementById('slingFormulasLayout').style.display = "block";
            renderSlingTriangle(A, B, C, β, apexAngle);
        }

        function renderTriangle(prefix, x1, y1, x2, y2, x3, y3, A, B, C, angle, alpha) {
            document.getElementById(prefix + '_vB').setAttribute('x2', x2);
            document.getElementById(prefix + '_vA').setAttribute('x1', x2);
            document.getElementById(prefix + '_vA').setAttribute('x2', x2);
            document.getElementById(prefix + '_vA').setAttribute('y2', y3);
            document.getElementById(prefix + '_vC').setAttribute('x2', x2);
            document.getElementById(prefix + '_vC').setAttribute('y2', y3);
// Re-align structural markers safely outside lines
            document.getElementById(prefix + '_vtxB').setAttribute('x', x2 + 6);
            document.getElementById(prefix + '_vtxC').setAttribute('x', x2 - 4);
            document.getElementById(prefix + '_vtxC').setAttribute('y', y3 - 8);

            const lblB = document.getElementById(prefix + '_lblB');
            const lblA = document.getElementById(prefix + '_lblA');
            const lblC = document.getElementById(prefix + '_lblC');
            const lblAngle = document.getElementById(prefix + '_lblAngle');
            const lblAlpha = document.getElementById(prefix + '_lblAlpha');

            if (A && B && C && angle) {
                lblB.setAttribute('x', x1 + (x2 - x1) / 2); lblB.setAttribute('y', y1 + 18); lblB.textContent = "AB = " + B.toFixed(2) + " m";
                lblA.setAttribute('x', x2 + 10); lblA.setAttribute('y', y1 - (y1 - y3) / 2 + 4); lblA.textContent = "BC = " + A.toFixed(2) + " m";
                lblC.setAttribute('x', x1 + (x2 - x1) / 2 - 12); lblC.setAttribute('y', y1 - (y1 - y3) / 2 - 12); lblC.textContent = "AC = " + C.toFixed(2) + " m";
                lblAngle.setAttribute('x', x1 + 28); lblAngle.setAttribute('y', y1 - 6); lblAngle.textContent = "θ: " + angle.toFixed(1) + "°";
                lblAlpha.setAttribute('x', x3 - 26); lblAlpha.setAttribute('y', y3 + 24); lblAlpha.textContent = "α: " + alpha.toFixed(1) + "°";
            } else {
                lblB.textContent = lblA.textContent = lblC.textContent = lblAngle.textContent = lblAlpha.textContent = "";
            }
        }

        function renderSlingTriangle(A, B, C, β, apexAngle) {
            const vA = document.getElementById('sling_vA');
            const vB_left = document.getElementById('sling_vB_left');
            const vB_right = document.getElementById('sling_vB_right');
            const vC_left = document.getElementById('sling_vC_left');
            const vC_right = document.getElementById('sling_vC_right');

            const lblB = document.getElementById('sling_lblB');
            const lblA = document.getElementById('sling_lblA');
            const lblC_left = document.getElementById('sling_lblC_left');
            const lblC_right = document.getElementById('sling_lblC_right');
            const lblAngleA = document.getElementById('sling_lblAngleA');
            const lblAngleB = document.getElementById('sling_lblAngleB');
            const lblAngleC = document.getElementById('sling_lblAngleC');

            const vtxA = document.getElementById('sling_vtxA');
            const vtxB = document.getElementById('sling_vtxB');
            const vtxC = document.getElementById('sling_vtxC');
            const vtxD = document.getElementById('sling_vtxD');

            if (A && B && C && β) {
                const scale = 110 / Math.max(A, B / 2);
                const cX = 150; 
                const bY = 190; 
                const apexY = bY - (A * scale);
                const leftX = cX - ((B / 2) * scale);
                const rightX = cX + ((B / 2) * scale);

                vA.setAttribute('y2', apexY);
                vB_left.setAttribute('x1', leftX); vB_left.setAttribute('x2', cX);
                vB_right.setAttribute('x1', cX); vB_right.setAttribute('x2', rightX);
                vC_left.setAttribute('x1', leftX); vC_left.setAttribute('x2', cX); vC_left.setAttribute('y2', apexY);
                vC_right.setAttribute('x1', rightX); vC_right.setAttribute('x2', cX); vC_right.setAttribute('y2', apexY);

                // Anchor Node Positioning maps
                vtxA.setAttribute('x', leftX - 18); vtxA.setAttribute('y', bY + 5);
                vtxB.setAttribute('x', rightX + 8); vtxB.setAttribute('y', bY + 5);
                vtxC.setAttribute('x', cX - 5); vtxC.setAttribute('y', apexY - 8);
                vtxD.setAttribute('x', cX - 4); vtxD.setAttribute('y', bY + 14);

                // Clear labels positioning logic tracking sides dynamically
                lblB.setAttribute('x', cX); lblB.setAttribute('y', bY + 18); lblB.textContent = "AB = " + B.toFixed(2) + " m";
                lblA.setAttribute('x', cX - 8); lblA.setAttribute('y', apexY + (bY - apexY) / 2); lblA.textContent = "CD = " + A.toFixed(2) + " m";
                
                lblC_left.setAttribute('x', leftX + (cX - leftX) / 2 - 8); lblC_left.setAttribute('y', apexY + (bY - apexY) / 2 - 8);
                lblC_left.textContent = "AC = " + C.toFixed(2) + " m";
                
                lblC_right.setAttribute('x', cX + (rightX - cX) / 2 + 8); lblC_right.setAttribute('y', apexY + (bY - apexY) / 2 - 8);
                lblC_right.textContent = "BC = " + C.toFixed(2) + " m";

                // Angles rendering layout alignment
                lblAngleA.setAttribute('x', leftX + 16); lblAngleA.setAttribute('y', bY - 6); lblAngleA.textContent = "∠A:" + β.toFixed(1) + "°";
                lblAngleB.setAttribute('x', rightX - 16); lblAngleB.setAttribute('y', bY - 6); lblAngleB.textContent = "∠B:" + β.toFixed(1) + "°";
                lblAngleC.setAttribute('x', cX); lblAngleC.setAttribute('y', apexY + 24); lblAngleC.textContent = "∠C:" + apexAngle.toFixed(1) + "°";
            } else {
                vA.setAttribute('y2', 190);
                vB_left.setAttribute('x1', 150); vB_left.setAttribute('x2', 150);
                vB_right.setAttribute('x1', 150); vB_right.setAttribute('x2', 150);
                vC_left.setAttribute('x1', 150); vC_left.setAttribute('x2', 150); vC_left.setAttribute('y2', 190);
                vC_right.setAttribute('x1', 150); vC_right.setAttribute('x2', 150); vC_right.setAttribute('y2', 190);
                
                vtxA.setAttribute('x', 150); vtxB.setAttribute('x', 150); vtxC.setAttribute('y', 190); vtxD.setAttribute('x', 150);
                lblB.textContent = lblA.textContent = lblC_left.textContent = lblC_right.textContent = lblAngleA.textContent = lblAngleB.textContent = lblAngleC.textContent = "";
            }
        }
    </script>
